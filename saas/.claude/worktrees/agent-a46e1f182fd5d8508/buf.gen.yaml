version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/menems/saas
plugins:
  - remote: buf.build/protocolbuffers/go
    out: .
    opt: module=github.com/menems/saas
  - remote: buf.build/connectrpc/go
    out: .
    opt: module=github.com/menems/saas
  - remote: buf.build/bufbuild/es
    out: www/src/gen
    opt: target=ts
  - remote: buf.build/connectrpc/es
    out: www/src/gen
    opt: target=ts
