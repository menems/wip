version: "3.9"

# Development overrides: bind mounts, Vite HMR, air hot-reload for Go.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - go-cache:/root/.cache/go-build
      - go-mod:/go/pkg/mod
    environment:
      DATABASE_URL: postgres://saas:saas@postgres:5432/saas?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production-xxxxx
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      CORS_ORIGIN: http://localhost:5173
      PORT: "8080"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  go-cache:
  go-mod:
  node-modules:
