version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/db/migrations/001_create_users.up.sql"
    queries:
      - "internal/db/queries/user.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: false
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.text"
            go_type: "string"
